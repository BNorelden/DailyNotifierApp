<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Daily Morning Digest</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f7f7f7;
        padding: 20px;
        color: #333;
      }
      .container {
        max-width: 600px;
        margin: auto;
        background: #ffffff;
        padding: 20px;
        border-radius: 8px;
        border: 1px solid #e0e0e0;
      }
      h1 {
        font-size: 22px;
        margin-bottom: 10px;
      }
      .section-title {
        font-weight: bold;
        margin-top: 20px;
        margin-bottom: 6px;
        font-size: 16px;
      }
      .quote {
        font-style: italic;
        margin-bottom: 10px;
      }
      .footer {
        margin-top: 25px;
        font-size: 12px;
        color: #777;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>🌤️ Daily Morning Digest</h1>

      <div class="section-title">📝 Quote of the Day</div>
      <div class="quote">
        "{{quote}}"
        <br />
        — <strong>{{author}}</strong>
      </div>

      <div class="section-title">🌡️ Weather</div>
      <div>{{weather}}</div>

      <div class="footer">Sent automatically by your DailyNotifierApp.</div>
    </div>
  </body>
</html>
